<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, system-ui; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); margin: 0; padding: 15px; }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 12px; margin-bottom: 10px; position: relative; border: 1px solid rgba(0,0,0,0.1); }
        .btn { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-del { background: #ff4d4d; color: white; position: absolute; right: 10px; top: 10px; padding: 4px 8px; border-radius: 6px; font-size: 11px; border: none; }
        .hidden { display: none; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); box-sizing: border-box; }
        h4 { margin: 0 0 5px 0; }
        p { margin: 5px 0; font-size: 14px; opacity: 0.9; }
    </style>
</head>
<body>
    <div id="view-list">
        <h3 id="group-name">Загрузка...</h3>
        <div id="admin-btn" class="hidden">
            <button class="btn" onclick="showAdd()">➕ Добавить задание</button>
        </div>
        <div id="hw-container" style="margin-top: 15px;"></div>
    </div>

    <div id="view-form" class="hidden">
        <h3>Новое задание</h3>
        <select id="sub-list"></select>
        <textarea id="task-data" rows="5" placeholder="Опишите, что нужно сделать..."></textarea>
        <button class="btn" onclick="saveHW()">✅ Опубликовать</button>
        <button class="btn" style="background: gray;" onclick="showList()">Отмена</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let userRole = '';

        async function init() {
            tg.expand();
            const uid = tg.initDataUnsafe.user.id;
            const r = await fetch(`/api/user_info?user_id=${uid}`);
            const data = await r.json();
            
            document.getElementById('group-name').innerText = `Группа: ${data.group}`;
            userRole = data.role;

            if(['Староста', 'Админ', 'Помощник'].includes(userRole)) {
                document.getElementById('admin-btn').classList.remove('hidden');
                const sR = await fetch(`/api/get_disciplines?plan_id=${data.plan_id}&semester=${data.semester}`);
                const subs = await sR.json();
                subs.forEach(s => document.getElementById('sub-list').innerHTML += `<option>${s}</option>`);
            }
            loadCards();
        }

        async function loadCards() {
            const r = await fetch(`/api/get_hw?user_id=${tg.initDataUnsafe.user.id}`);
            const cards = await r.json();
            const container = document.getElementById('hw-container');
            container.innerHTML = cards.length ? '' : 'Заданий пока нет';
            
            cards.forEach(c => {
                const canDel = ['Староста', 'Админ'].includes(userRole);
                container.innerHTML += `
                    <div class="card">
                        ${canDel ? `<button class="btn-del" onclick="delHW(${c.id})">Удалить</button>` : ''}
                        <h4>${c.subject}</h4>
                        <p>${c.task}</p>
                        <small style="opacity:0.6">${c.date}</small>
                    </div>`;
            });
        }

        async function saveHW() {
            const task = document.getElementById('task-data').value;
            const subject = document.getElementById('sub-list').value;
            if(!task) return alert("Введите текст");

            await fetch('/api/save_hw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, subject, task })
            });
            showList();
            loadCards();
        }

        async function delHW(id) {
            if(confirm("Удалить задание?")) {
                await fetch('/api/delete_hw', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ hw_id: id, user_id: tg.initDataUnsafe.user.id })
                });
                loadCards();
            }
        }

        function showAdd() { document.getElementById('view-list').classList.add('hidden'); document.getElementById('view-form').classList.remove('hidden'); }
        function showList() { document.getElementById('view-list').classList.remove('hidden'); document.getElementById('view-form').classList.add('hidden'); }

        init();
    </script>
</body>
</html>
