<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КузГТУ ДЗ Панель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h3>🎓 Панель студента</h3>
    <p>Группа: <span id="group">Загрузка...</span></p>
    
    <button class="btn" onclick="sendData('my_hw')">Мои задания</button>
    <button class="btn" onclick="sendData('schedule')">Расписание</button>
    <button class="btn" style="background: #e53935;" onclick="tg.close()">Закрыть</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на все окно

        // Отображаем имя пользователя из данных TG
        document.getElementById('group').innerText = tg.initDataUnsafe.user?.first_name || "Пользователь";

        function sendData(action) {
            // Отправляем данные обратно в бот
            tg.sendData(JSON.stringify({
                button_clicked: action,
                user_id: tg.initDataUnsafe.user?.id
            }));
        }
    </script>
</body>
</html>
