<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КузГТУ ДЗ - Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .user-info {
            background-color: var(--secondary-bg);
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            border: 1px solid var(--hint-color);
        }

        .card {
            background-color: var(--secondary-bg);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card h4 { margin: 0; color: var(--button-color); }

        .btn {
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn:active { opacity: 0.7; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--hint-color);
            background: var(--bg-color);
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div class="header">
        <h3>🎓 ADAM: КузГТУ</h3>
    </div>

    <div id="user-card" class="user-info">
        Загрузка данных пользователя...
    </div>

    <div class="card">
        <h4>🔍 Быстрый поиск ДЗ</h4>
        <div class="input-group">
            <input type="text" id="subject-input" placeholder="Введите название предмета...">
            <button class="btn" onclick="sendSearch()">Найти в боте</button>
        </div>
    </div>

    <div class="card">
        <h4>📌 Управление</h4>
        <button class="btn" style="margin-bottom: 5px;" onclick="sendAction('view_subs')">📖 Посмотреть все ДЗ</button>
        <button class="btn" onclick="sendAction('profile_info')">👤 Мой профиль</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение

        // Инициализация данных пользователя
        const userCard = document.getElementById('user-card');
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            userCard.innerHTML = `<b>Пользователь:</b> ${user.first_name} ${user.last_name || ''}<br><b>ID:</b> ${user.id}`;
        } else {
            userCard.innerText = "Ошибка доступа к данным Telegram";
        }

        // Функция отправки простых команд
        function sendAction(action) {
            const data = {
                "action": action,
                "source": "webapp"
            };
            tg.sendData(JSON.stringify(data));
        }

        // Функция поиска (имитирует ввод текста для бота)
        function sendSearch() {
            const subject = document.getElementById('subject-input').value;
            if (!subject) {
                tg.showAlert("Введите название предмета!");
                return;
            }
            const data = {
                "action": "search_subject",
                "query": subject
            };
            tg.sendData(JSON.stringify(data));
        }

        // Основная кнопка внизу экрана (MainButton)
        tg.MainButton.text = "Закрыть панель";
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            tg.close();
        });

        // Установка цвета хедера под тему
        tg.setHeaderColor('secondary_bg_color');
    </script>
</body>
</html>
